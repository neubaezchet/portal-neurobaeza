<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#030305" />
    <meta
      name="description"
      content="Portal de Validación — IncaNeurobaeza | Enterprise 2026"
    />
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Google Fonts — Plus Jakarta Sans + Outfit + Inter (Enterprise 2026) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <title>Portal Neurobaeza — Enterprise</title>

    <!-- Vanta.js FOG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <style>
      html, body {
        background-color: #030305;
        color: #F1F5F9;
        color-scheme: dark;
      }
      /* Critical loading state */
      #root:empty::after {
        content: '';
        display: block;
        width: 32px;
        height: 32px;
        margin: 40vh auto;
        border: 2px solid rgba(129, 140, 248, 0.15);
        border-top-color: #818CF8;
        border-radius: 50%;
        animation: loader-spin 0.7s linear infinite;
      }
      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
    <div id="root"></div>
    
    <!-- PDF.js Initialization (debe cargarse ANTES de React) -->
    <script src="%PUBLIC_URL%/scripts/pdf-init.js"></script>
  </body>
</html>
